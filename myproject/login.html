<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Authorization</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <a href="index.html">
        <div class="back" id="cross">
            <i class="fa fa-times" aria-hidden="true"></i>
        </div>
    </a>
    <hr>
    <div class="main">
        <div class="email">
            <form action="" id="login" onsubmit="myfunction()">
                <h1>Sign in</h1>
                <div class="mail">
                    <input type="email" id="email" class="inputText" required>
                    <span class="floating-label">Your email address</span>
                </div>
                <div class="mail">
                    <input type="password" id="password" class="inputText" minlength="8" maxlength="30" required> <i
                        class="fa fa-eye" id="togglePassword"></i><br>
                    <span class="floating-label">Password</span>
                </div>
                <p id="keep"><input type="checkbox" id="checkbox"><label for="checkbox" id="keepid">

                        This is a public or shared device</label><a href="signup.html"></a></p>
                <p>By signing in, I agree to the Orbitz<a href=""><span> Terms and Conditions, Privacy Statement and
                            Orbitz Rewards Terms and Conditions.</span></a>.</p>
                <input type="submit" value="Sign In" id="create">
                <p style="text-align:center; margin-top: 5%;"> <a href="signup.html">Forgot password?</a></p>
                <p style="text-align:center;margin-top: 5%;">Don't have an account?<a href="signin.html"><span>Create
                            one</span></a>
                </p>
            </form>
        </div>
    </div>
    <script src="login.js"></script>

</body>

</html>
